<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>三天remotion — 编辑器</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    :root { --comp-panel-w: 280px; }
    body{height:100%;display:flex;flex-direction:column;overflow:hidden}

    /* ── Split layout (OD .split) ── */
    .split{display:grid;grid-template-columns:var(--comp-panel-w) 8px minmax(0,1fr);min-height:0;min-width:0;max-width:100%;overflow:hidden;background:var(--bg);flex:1}
    .pane{display:flex;flex-direction:column;min-height:0;min-width:0;background:var(--bg-panel);overflow:hidden}
    .split-handle{position:relative;z-index:45;width:8px;min-width:8px;height:100%;cursor:col-resize;background:transparent;touch-action:none}
    .split-handle::before{content:"";position:absolute;top:0;bottom:0;left:-10px;right:-10px;cursor:col-resize}
    .split-handle::after{content:"";position:absolute;top:0;bottom:0;left:calc(50% - 0.5px);width:1px;pointer-events:none;background:color-mix(in srgb,var(--border) 92%,transparent);opacity:.9;transition:background-color 140ms var(--ease-out),box-shadow 140ms var(--ease-out),opacity 140ms var(--ease-out)}
    .split-handle:hover::after,.split-handle:focus-visible::after,.split.is-resizing .split-handle::after{background:color-mix(in srgb,var(--accent) 70%,var(--border));box-shadow:none;opacity:1}
    .split-handle:focus-visible{outline:none}

    /* ── Component panel (OD df-panel + db-reference patterns) ── */
    .comp-panel{background:var(--bg);display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--border);position:relative}
    /* Search (OD db-reference-search) */
    .comp-search{flex:0 0 auto;display:inline-flex;align-items:center;gap:8px;height:34px;margin:12px 12px 0;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-panel);transition:border-color 140ms var(--ease-out),box-shadow 140ms var(--ease-out)}
    .comp-search:focus-within{border-color:color-mix(in srgb,var(--accent) 45%,var(--border));box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}
    .comp-search input{flex:1 1 auto;min-width:0;border:0;background:transparent;color:var(--text);font-size:13px;outline:none}
    .comp-search input:focus{border:0;box-shadow:none}
    .comp-search input::placeholder{color:var(--text-soft)}
    .comp-search input::-webkit-search-cancel-button{-webkit-appearance:none;appearance:none}
    .comp-search-clear{display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:var(--radius-sm);padding:2px;background:transparent;color:var(--text-soft);cursor:pointer;transition:background 140ms var(--ease-out),color 140ms var(--ease-out)}
    .comp-search-clear:hover{background:var(--bg-subtle);color:var(--text)}
    /* Chips (OD db-reference-chip) */
    .comp-chips{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:10px 12px 4px;overflow-x:auto;scrollbar-width:none}
    .comp-chips::-webkit-scrollbar{display:none}
    .comp-chip{flex:0 0 auto;display:inline-flex;align-items:center;gap:7px;border:1px solid color-mix(in srgb,var(--border) 88%,transparent);border-radius:var(--radius-pill);background:var(--bg-panel);color:var(--text-muted);padding:6px 13px;font-size:12.5px;font-weight:550;white-space:nowrap;cursor:pointer;transition:background 140ms var(--ease-out),border-color 140ms var(--ease-out),color 140ms var(--ease-out)}
    .comp-chip:hover{color:var(--text);border-color:var(--border-strong)}
    .comp-chip.is-active{border-color:color-mix(in srgb,var(--accent) 40%,var(--border));background:var(--accent-tint);color:var(--accent-strong)}
    .comp-chip-count{min-width:18px;text-align:center;border-radius:var(--radius-pill);padding:1px 6px;font-size:11px;font-weight:600;color:var(--text-soft);background:color-mix(in srgb,var(--border) 40%,transparent)}
    .comp-chip.is-active .comp-chip-count{color:var(--accent-strong);background:color-mix(in srgb,var(--accent) 18%,transparent)}
    /* Scrollable card grid */
    .comp-body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:0;display:flex;flex-direction:column;gap:10px;scrollbar-width:thin}
    /* Card (OD .home-hero__plugin-preset) */
    .comp-card{appearance:none;position:relative;flex:0 0 auto;width:calc(100% - 24px);margin:0 12px;min-width:0;display:grid;grid-template-rows:150px minmax(0,auto);gap:8px;padding:0;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--bg-panel);color:var(--text);font:inherit;text-align:left;cursor:grab;box-shadow:var(--shadow-xs);overflow:hidden;transition:border-color 140ms var(--ease-out),background-color 140ms var(--ease-out),color 140ms var(--ease-out),transform 140ms var(--ease-out),box-shadow 140ms var(--ease-out)}
    .comp-card:not(:disabled):hover,.comp-card:not(:disabled):focus-visible{border-color:color-mix(in srgb,var(--accent) 42%,var(--border));background:color-mix(in srgb,var(--accent-tint) 32%,var(--bg-panel));color:var(--text-strong);transform:translateY(-1px);box-shadow:var(--shadow-sm);outline:none}
    .comp-card:active{cursor:grabbing}
    .comp-card.dragging{cursor:grabbing;opacity:.55;transform:scale(1.02);box-shadow:var(--shadow-md)}
    .comp-card__preview{position:relative;min-width:0;min-height:0;overflow:hidden;background:var(--bg-subtle);border-bottom:1px solid color-mix(in srgb,var(--border) 72%,transparent)}
    .comp-card__preview .swatch{position:absolute;inset:0;display:flex}
    .comp-card__preview .swatch span{flex:1;min-width:0}
    .comp-card__body{padding:0 12px 12px;display:flex;flex-direction:column;gap:3px;min-width:0}
    .comp-card__title{min-width:0;font-size:12.5px;font-weight:650;color:var(--text);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .comp-card__desc{font-size:11px;color:var(--text-muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

    /* ── Workspace (right pane) ── */
    .workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;background:var(--bg-app)}
    .ws-scroll{flex:1;display:flex;flex-direction:column;align-items:center;gap:20px;padding:24px 24px 0;overflow-y:auto;min-height:0;scrollbar-width:thin}

    /* ── Video preview ── */
    .preview{width:100%;max-width:800px;aspect-ratio:16/9;background:#000;border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative;overflow:hidden;box-shadow:var(--shadow-xs);flex-shrink:0}
    .preview video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;display:none}
    .preview.has-video video{display:block}
    .preview.has-video .preview__overlay{opacity:0;transition:opacity 200ms var(--ease-out)}
    .preview.has-video:hover .preview__overlay,.preview.has-video.paused .preview__overlay{opacity:1}
    .preview__overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2}
    .preview__icon{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);background:var(--bg-panel);display:grid;place-items:center;color:var(--text-muted);font-size:20px;box-shadow:var(--shadow-sm);cursor:pointer;pointer-events:auto}
    .preview__name{font-size:14px;font-weight:650;color:var(--text-strong);position:relative;z-index:3}
    .preview__meta{font-size:12px;color:var(--text-muted);position:relative;z-index:3}
    .preview__placeholder{color:var(--text-soft);font-size:13px;position:relative;z-index:3}
    .preview__upload{appearance:none;display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border:1px solid var(--border);border-radius:var(--radius-pill);background:var(--bg-panel);color:var(--text);font:inherit;font-size:12.5px;font-weight:650;cursor:pointer;box-shadow:var(--shadow-xs);transition:all var(--dur-quick) var(--ease-out);position:relative;z-index:3}
    .preview__upload:hover{border-color:var(--border-strong);color:var(--accent);background:var(--bg-subtle);transform:translateY(-0.5px);box-shadow:var(--shadow-sm)}

    /* ── Timeline ── */
    .timeline{width:100%;max-width:800px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
    .tl-head{display:flex;align-items:center;gap:6px}
    .tl-btn{appearance:none;width:28px;height:28px;flex:0 0 auto;padding:0;border:1px solid transparent;border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font:inherit;font-size:12px;transition:background-color 140ms var(--ease-out),color 140ms var(--ease-out),border-color 140ms var(--ease-out)}
    .tl-btn:hover,.tl-btn.is-active{background:var(--bg-subtle);border-color:var(--border-strong);color:var(--text)}
    .tl-btn--wider{width:auto;padding:0 6px;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
    .tl-vol-slider{-webkit-appearance:none;appearance:none;width:64px;height:4px;border-radius:2px;background:var(--border-strong);outline:none;cursor:pointer}
    .tl-vol-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg-panel);box-shadow:var(--shadow-sm);cursor:pointer}
    .tl-vol-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--accent);border:2px solid var(--bg-panel);box-shadow:var(--shadow-sm);cursor:pointer;border-color:var(--bg-panel)}
    .tl-label{font-size:11px;font-weight:600;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.08em}
    .tl-track{position:relative;height:80px;background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;padding:0 16px;box-shadow:var(--shadow-xs);cursor:pointer;user-select:none}
    .tl-line{position:absolute;left:16px;right:16px;height:2px;background:var(--border-strong);border-radius:1px}
    .tl-ticks{position:absolute;left:16px;right:16px;top:50%;transform:translateY(-50%);display:flex;justify-content:space-between}
    .tl-tick{width:1px;height:8px;background:var(--border-strong);opacity:.6}
    .tl-playhead{position:absolute;top:8px;bottom:8px;width:2px;background:var(--accent);border-radius:1px;z-index:2;pointer-events:none}
    .tl-playhead::before{content:'';position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:14px;height:14px;background:var(--accent);border-radius:50%;border:2px solid var(--bg-panel);box-shadow:var(--shadow-sm)}
    .tl-time{display:flex;justify-content:space-between;font-size:11px;color:var(--text-faint);font-family:var(--mono);padding:0 16px}
    /* Timeline markers */
    .tl-marker{position:absolute;top:60%;transform:translate(-50%,-50%);z-index:3;display:inline-flex;align-items:center;gap:3px;padding:2px 6px;border-radius:var(--radius-pill);font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer;box-shadow:var(--shadow-xs);transition:transform 120ms var(--ease-out)}
    .tl-marker:hover{transform:translate(-50%,-50%) scale(1.1);z-index:4}
    .tl-track.drag-over-tl{background:color-mix(in srgb,var(--accent-tint) 20%,var(--bg-panel));border-color:color-mix(in srgb,var(--accent) 42%,var(--border))}

    /* ── Chat (OD chat-log + msg) ── */
    .chat{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:24px;padding:24px 20px;scrollbar-width:thin;scrollbar-color:color-mix(in srgb,var(--text-muted) 18%,transparent) transparent}
    .chat-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:12.5px;padding:40px 0}
    .msg{padding:0;background:transparent;border:none;white-space:normal;word-wrap:break-word;min-width:0;max-width:100%;animation:msgIn 200ms cubic-bezier(0.23,1,0.32,1) both}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg .role{display:flex;align-items:baseline;gap:8px;font-size:13.5px;font-weight:600;color:var(--text-strong);margin-bottom:8px;letter-spacing:0;text-transform:none}
    .msg .role.user{color:var(--text-muted)}
    .msg-text{font-size:14.5px;color:var(--text);line-height:1.5;white-space:pre-wrap;word-wrap:break-word}
    .msg.user{display:flex;flex-direction:column;align-items:flex-end;max-width:min(78%,560px);align-self:flex-end}
    .msg.user .msg-text{background:var(--bg-fill-tertiary);border:none;border-radius:var(--radius-lg);padding:8px 12px}
    .msg-time{font-size:11px;color:var(--text-faint);font-weight:500;font-variant-numeric:tabular-nums;white-space:nowrap;margin-top:8px}

    /* ── Input card ── */
    .input-card{position:relative;z-index:2;width:100%;max-width:720px;background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:none;padding:14px 14px 10px;display:flex;flex-direction:column;gap:10px;margin:0 auto 24px;transition:border-color 120ms var(--ease-out),box-shadow 120ms var(--ease-out);flex-shrink:0}
    .input-card:focus-within{border-color:color-mix(in srgb,var(--accent) 40%,var(--border));box-shadow:none}
    .input-editor{min-height:48px;padding:8px 4px;font-size:14px;color:var(--text-strong);outline:none;line-height:1.55;word-break:break-word}
    .input-editor:empty::before{content:attr(data-placeholder);color:var(--text-soft);pointer-events:none}
    .input-foot{position:relative;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;border-top:0;padding-top:8px}
    .input-foot-l{display:flex;align-items:center;gap:6px;min-width:0;flex:1 1 auto;flex-wrap:nowrap;overflow:visible}
    .input-foot-l strong{color:var(--text-strong);font-weight:650}
    .input-foot-r{display:flex;align-items:center;gap:8px;flex:0 0 auto}
    .input-submit{appearance:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-width:64px;height:32px;padding:0 16px;border-radius:var(--radius-pill);border:1px solid var(--accent);background:var(--accent);color:white;box-shadow:var(--shadow-xs);cursor:pointer;font:inherit;font-size:12.5px;font-weight:650;line-height:1;transition:background-color 140ms cubic-bezier(0.23,1,0.32,1),border-color 140ms cubic-bezier(0.23,1,0.32,1),box-shadow 140ms cubic-bezier(0.23,1,0.32,1),transform 140ms cubic-bezier(0.23,1,0.32,1),opacity 140ms cubic-bezier(0.23,1,0.32,1)}
    .input-submit:hover:not(:disabled){background:var(--accent-hover);border-color:var(--accent-hover);box-shadow:var(--shadow-sm)}
    .input-submit:active:not(:disabled){transform:translateY(1px);box-shadow:var(--shadow-xs)}
    .input-submit:disabled{opacity:.5;cursor:default;box-shadow:none}

    @media(max-width:900px){.split{grid-template-columns:0 0 minmax(0,1fr)}.comp-panel{display:none}}
    @media(max-width:560px){.ws-scroll{padding:16px 16px 0}.preview{max-width:100%}.timeline{max-width:100%}.input-card{max-width:100%;margin:0 16px 16px}.chat{padding:16px 12px}}
  </style>
</head>
<body>

  <div class="tabs-chrome" id="tabsBar" role="tablist" aria-label="页面标签"></div>

  <div class="split" id="splitRoot">
    <!-- Left: Component panel -->
    <aside class="pane comp-panel" id="compPanel">
      <div class="comp-search">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="flex:0 0 auto;opacity:.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="compSearch" placeholder="搜索组件…" />
        <button class="comp-search-clear" id="compSearchClear" style="display:none" aria-label="清除搜索">×</button>
      </div>
      <div class="comp-chips" id="compChips">
        <button class="comp-chip is-active" data-cat="入场">入场<span class="comp-chip-count">4</span></button>
        <button class="comp-chip" data-cat="退场">退场<span class="comp-chip-count">3</span></button>
        <button class="comp-chip" data-cat="文字">文字<span class="comp-chip-count">4</span></button>
        <button class="comp-chip" data-cat="背景">背景<span class="comp-chip-count">4</span></button>
        <button class="comp-chip" data-cat="卡片">卡片<span class="comp-chip-count">3</span></button>
        <button class="comp-chip" data-cat="Glam">Glam<span class="comp-chip-count">6</span></button>
      </div>
      <div class="comp-body" id="compBody"></div>
    </aside>

    <!-- Resize handle (OD .split-resize-handle) -->
    <div class="split-handle" id="splitHandle"></div>

    <!-- Right: Workspace -->
    <main class="pane workspace">
      <div class="ws-scroll">
        <div class="preview" id="previewArea" data-od-id="video-preview">
          <video id="previewVideo" playsinline></video>
          <div class="preview__overlay" id="previewOverlay" style="display:none">
            <div class="preview__icon" id="playBtn">▶</div>
          </div>
          <div class="preview__placeholder" id="previewPlaceholder">拖入视频素材，或点击下方按钮上传</div>
          <div class="preview__name" id="previewName" style="display:none"></div>
          <div class="preview__meta" id="previewMeta" style="display:none"></div>
          <button class="preview__upload" id="previewUpload" type="button" onclick="document.getElementById('reupload').click()">选择视频文件</button>
        </div>

        <div class="timeline" data-od-id="timeline">
          <div class="tl-head"><button class="tl-btn" id="tlPlayBtn" type="button" title="播放/暂停">▶</button><button class="tl-btn tl-btn--wider" id="tlSpeedBtn" type="button" title="播放速度">1×</button><button class="tl-btn" id="tlVolBtn" type="button" title="静音/取消静音">🔊</button><input type="range" class="tl-vol-slider" id="tlVolSlider" min="0" max="100" value="100" title="音量" /><div class="tl-label">时间轴</div></div>
          <div class="tl-track" id="tlTrack">
            <div class="tl-line"></div>
            <div class="tl-ticks"><span class="tl-tick"></span><span class="tl-tick"></span><span class="tl-tick"></span><span class="tl-tick"></span><span class="tl-tick"></span><span class="tl-tick"></span><span class="tl-tick"></span><span class="tl-tick"></span><span class="tl-tick"></span></div>
            <div class="tl-playhead" id="tlPlayhead" style="left:16px"></div>
          </div>
          <div class="tl-time"><span id="tlCurrent">00:00</span><span id="tlTotal">03:20</span></div>
        </div>

        <div class="chat" id="chatArea" data-od-id="chat-history">
          <div class="chat-empty" id="chatEmpty">输入效果描述，开始对话</div>
        </div>
      </div>

      <div class="input-card">
        <div class="input-editor" contenteditable="true" data-placeholder="描述要给视频加什么效果…" aria-label="效果描述输入" role="textbox" aria-multiline="true"></div>
        <div class="input-foot">
          <div class="input-foot-l">39 组件 · 6 Glam 配方 · <strong>MIT</strong></div>
          <div class="input-foot-r">
            <button class="input-submit" id="generateBtn">生成效果 →</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <input type="file" id="reupload" accept="video/*" style="display:none" />

  <script src="shared.js"></script>
  <script src="components-data.js"></script>
  <script src="effects.js"></script>
  <script src="editor-core.js"></script>
  <script src="editor-timeline.js"></script>
  <script>
    window.__PAGE = { id: 'editor' };
    renderTabs();
  </script>
</body>
</html>
